name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip and install build deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Prepare build folders (PowerShell safe)
        shell: pwsh
        run: |
          if (-not (Test-Path -Path 'dist')) { New-Item -ItemType Directory -Path 'dist' | Out-Null }
          if (-not (Test-Path -Path 'build')) { New-Item -ItemType Directory -Path 'build' | Out-Null }
          if (-not (Test-Path -Path 'generated')) { New-Item -ItemType Directory -Path 'generated' | Out-Null }
          if (-not (Test-Path -Path 'brain_data.txt')) { '' | Out-File -FilePath 'brain_data.txt' -Encoding utf8 }

      - name: Run PyInstaller to create single-file GUI EXE (cmd shell)
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --clean --name neuro-trace-gen ^
            --noconsole ^
            --add-data "brain_data.txt;." ^
            --add-data "generated;generated" ^
            main.py

      - name: Verify EXE exists (PowerShell safe)
        shell: pwsh
        run: |
          if (-not (Test-Path -Path 'dist\neuro-trace-gen.exe')) {
            Write-Error "ERROR: EXE not found"
            exit 1
          } else {
            Write-Host "EXE built: dist\neuro-trace-gen.exe"
          }

      - name: Smoke test using Python (do not run GUI exe in CI)
        shell: pwsh
        run: |
          python - <<'PY'
          from main import Generator
          g = Generator(width=64, height=64)
          out = 'test_out.png'
          g.generate_to_path(out)
          print('Smoke test generated', out)
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuro-trace-gen-windows-exe
          path: |
            dist\neuro-trace-gen.exe
            build
            dist
            test_out.png
